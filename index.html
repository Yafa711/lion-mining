<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #2c3e50, #000); color: #f1c40f; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .score-board { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 15px #f39c12; margin-bottom: 20px; }
        .lion-btn { width: 250px; height: 250px; border-radius: 50%; border: 5px solid #f1c40f; box-shadow: 0 0 30px #f39c12; cursor: pointer; transition: transform 0.1s ease-in-out; -webkit-tap-highlight-color: transparent; }
        .lion-btn:active { transform: scale(0.95); }
        .footer { position: fixed; bottom: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="score-board" id="balance">0.000</div>
    <img src="lion_icon.png" class="lion-btn" id="clicker" alt="Lion">
    <div class="footer">جاري تعدين عملة الأسد...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // لفتح التطبيق على كامل الشاشة

        let balance = localStorage.getItem('lion_balance') || 0;
        document.getElementById('balance').innerText = parseFloat(balance).toFixed(3);

        document.getElementById('clicker').onclick = function() {
            balance = parseFloat(balance) + 0.001;
            document.getElementById('balance').innerText = balance.toFixed(3);
            localStorage.setItem('lion_balance', balance);
            
            // اهتزاز خفيف للهاتف عند النقر (Haptic Feedback)
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        };
    </script>
</body>
</html>
