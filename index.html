<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lion Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #f1c40f; text-align: center; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        .score { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }
        .lion-btn { width: 220px; height: 220px; border-radius: 50%; box-shadow: 0 0 20px #f39c12; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .lion-btn:active { transform: scale(0.9); }
        .progress-bar { width: 80%; height: 10px; background: #333; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 100%; height: 100%; background: #f1c40f; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="score" id="balance">0.000</div>
    <img src="lion.png" id="tapBtn" class="lion-btn">
    <div class="progress-bar"><div class="progress-fill" id="energy"></div></div>
    <p>طاقة التعدين: <span id="energyVal">1000</span>/1000</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0;
        let energy = 1000;

        document.getElementById('tapBtn').onclick = () => {
            if (energy > 0) {
                balance += 0.001;
                energy -= 1;
                document.getElementById('balance').innerText = balance.toFixed(3);
                document.getElementById('energyVal').innerText = energy;
                document.getElementById('energy').style.width = (energy/10) + "%";
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        };
    </script>
</body>
</html>
